name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            market-quotes-frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix market-quotes-frontend

      - name: Run test suite
        run: npm test

      - name: Security audit (high)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint frontend
        run: npm run lint --prefix market-quotes-frontend

      - name: Build frontend
        run: npm run build --prefix market-quotes-frontend
