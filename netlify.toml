# Market Monitor — deploy unico: frontend (Vite) + API Express (Netlify Functions)

[build]
  command = "npm ci && npm ci --prefix market-quotes-frontend && npm run build --prefix market-quotes-frontend"
  publish = "market-quotes-frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE = ""

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "axios",
    "cors",
    "dotenv",
    "express",
    "serverless-http",
    "yahoo-finance2",
  ]
  included_files = ["server.js", "lib/**", "lib/trading/**"]

[functions."api"]
  timeout = 10

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
