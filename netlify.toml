# Market Monitor — deploy unico: frontend (Vite) + API Express (Netlify Functions)

[build]
  command = "npm ci && npm ci --prefix market-quotes-frontend && npm run build --prefix market-quotes-frontend"
  publish = "market-quotes-frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE = ""
  REQUEST_TIMEOUT_MS = "9000"
  HISTORY_BATCH_TIMEOUT_MS = "8000"
  MARKET_LOAD_TIMEOUT_MS = "8000"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "@neondatabase/serverless",
    "axios",
    "bcryptjs",
    "cors",
    "dataloader",
    "dotenv",
    "express",
    "express-oauth2-jwt-bearer",
    "graphql",
    "graphql-http",
    "jsonwebtoken",
    "serverless-http",
    "web-push",
  ]
  included_files = ["server.mjs", "lib/package.json", "lib/**", "lib/trading/**", "db/**"]

[functions."api"]
  timeout = 10

[functions."portfolio-monitor"]
  schedule = "*/5 * * * *"
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://appleid.cdn-apple.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss:; font-src 'self' data:; frame-src 'self' https://accounts.google.com; frame-ancestors 'none'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
